<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discord-Style Chat & Call</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        :root {
            --bg-primary: #36393f;
            --bg-secondary: #2f3136;
            --bg-tertiary: #202225;
            --bg-input: #40444b;
            --text-normal: #dcddde;
            --text-muted: #72767d;
            --text-header: #ffffff;
            --accent: #5865F2;
            --accent-hover: #4752C4;
            --divider: #42464D;
        }

        /* --- Custom Themes --- */
        [data-theme="light"] { --bg-primary: #ffffff; --bg-secondary: #f2f3f5; --bg-tertiary: #e3e5e8; --bg-input: #ebedef; --text-normal: #2e3338; --text-muted: #747f8d; --text-header: #060607; --accent: #5865F2; --divider: #e3e5e8; }
        [data-theme="hacker"] { --bg-primary: #0a0a0a; --bg-secondary: #000000; --bg-tertiary: #111111; --bg-input: #1a1a1a; --text-normal: #00ff00; --text-muted: #008800; --text-header: #00ff00; --accent: #00cc00; --divider: #222222; }
        [data-theme="sunset"] { --bg-primary: #2d1b2e; --bg-secondary: #1f1320; --bg-tertiary: #3a233b; --bg-input: #4a2d4b; --text-normal: #fcd5ce; --text-muted: #d8b4e2; --text-header: #ffb5a7; --accent: #ff9f1c; --divider: #5a375c; }
        [data-theme="naori"] { --bg-primary: #0a1128; --bg-secondary: #1c2541; --bg-tertiary: #050a1f; --bg-input: #2a3b5c; --text-normal: #80ffdb; --text-muted: #5390d9; --text-header: #ffffff; --accent: #00f5d4; --accent-hover: #00b4d8; --divider: #1a659e; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-primary); color: var(--text-normal); height: 100dvh; overflow: hidden; display: flex; justify-content: center; align-items: center; transition: background-color 0.3s; }
        #app-container { display: flex; width: 100vw; height: 100dvh; position: relative; }
        .hidden { display: none !important; }

        /* --- In-App Toast Notifications --- */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; width: 300px; max-width: 90vw; }
        .toast { background: var(--bg-secondary); border-left: 4px solid var(--accent); color: var(--text-normal); padding: 15px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; animation: slideIn 0.3s ease-out; position: relative; overflow: hidden; }
        .toast-title { font-weight: bold; color: var(--text-header); margin-bottom: 5px; font-size: 0.95rem; }
        .toast-body { font-size: 0.85rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.fade-out { opacity: 0; transition: opacity 0.3s ease-out; }

        /* --- Modals & Auth --- */
        .modal { background: var(--bg-secondary); padding: 40px; border-radius: 8px; width: 90%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 100; position: absolute; max-height: 90dvh; overflow-y: auto; }
        .modal h2 { color: var(--text-header); text-align: center; margin-bottom: 20px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 99; }
        .form-col { display: flex; flex-direction: column; gap: 15px; }
        input { background: var(--bg-tertiary); border: 1px solid var(--bg-tertiary); color: var(--text-normal); padding: 12px; border-radius: 4px; outline: none; font-size: 1rem; }
        input:focus { border-color: var(--accent); }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 4px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--bg-input); }
        .btn-secondary:hover { background: #4f545c; }
        .btn-danger { background: #ed4245; }
        .btn-success { background: #3ba55c; }
        .error { color: #ed4245; font-size: 0.85rem; text-align: center; }

        /* --- Settings Panel --- */
        .theme-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .theme-btn { padding: 8px; font-size: 0.9rem; background: var(--bg-input); }
        .setting-group { margin-bottom: 20px; border-bottom: 1px solid var(--divider); padding-bottom: 15px; }
        .setting-group label { display: block; color: var(--text-header); font-weight: bold; margin-bottom: 10px; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: transparent; color: var(--text-muted); font-size: 1.2rem; padding: 0; width: auto; }
        .avatar-frame { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; margin-right: 12px; background: var(--accent); display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 14px; overflow: hidden; flex-shrink: 0; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }

        /* --- Sidebar --- */
        #sidebar { width: 280px; background: var(--bg-secondary); display: flex; flex-direction: column; flex-shrink: 0; border-right: 1px solid var(--divider); }
        .sidebar-header { height: 48px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--bg-tertiary); font-weight: 600; color: var(--text-header); }
        .icon-btn { background: transparent; color: var(--text-muted); padding: 4px; font-size: 1.2rem; border-radius: 4px; cursor: pointer; }
        #user-list { flex: 1; overflow-y: auto; padding: 8px; }
        
        .user-item { display: flex; align-items: center; padding: 8px; margin-bottom: 2px; border-radius: 4px; cursor: pointer; color: var(--text-muted); transition: background 0.1s; position: relative; }
        .user-item:hover { background: var(--bg-input); color: var(--text-normal); }
        
        .unread-dot { width: 12px; height: 12px; background-color: #ff3b30; border-radius: 50%; position: absolute; right: 15px; display: none; box-shadow: 0 0 8px #ff3b30; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(255, 59, 48, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); } }

        #current-user-bar { background: var(--bg-tertiary); padding: 10px 16px; display: flex; align-items: center; gap: 10px; }
        .user-details { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .user-details strong { color: var(--text-header); font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- Chat Area --- */
        #chat-area { flex: 1; background: var(--bg-primary); display: flex; flex-direction: column; min-width: 0; }
        .chat-header { height: 48px; padding: 0 16px; display: flex; align-items: center; border-bottom: 1px solid var(--divider); font-weight: 600; color: var(--text-header); gap: 10px; flex-shrink: 0; }
        #mobile-back-btn { display: none; background: transparent; padding: 5px; color: var(--text-muted); }
        .header-actions { margin-left: auto; display: flex; gap: 10px; }
        #btn-start-call { background: var(--bg-tertiary); color: var(--text-normal); padding: 6px 12px; font-size: 0.85rem; border-radius: 4px; display: flex; align-items: center; gap: 5px; }

        #pinned-bar { background: var(--bg-secondary); border-bottom: 1px solid var(--divider); padding: 10px 16px; max-height: 100px; overflow-y: auto; font-size: 0.85rem; color: var(--text-muted); display: none; flex-shrink: 0; }
        .pinned-msg { border-left: 3px solid var(--accent); padding-left: 10px; margin-bottom: 5px; background: var(--bg-tertiary); padding: 5px 10px; border-radius: 4px; }
        .pinned-header { font-weight: bold; color: var(--text-header); margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }

        #messages-container { flex: 1; overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column; position: relative; }
        .message { display: flex; padding: 8px 16px; margin-top: 8px; position: relative; }
        .message:hover { background: rgba(4, 4, 5, 0.07); }
        
        .msg-actions { position: absolute; right: 16px; top: -10px; background: var(--bg-secondary); border: 1px solid var(--divider); border-radius: 4px; display: none; padding: 2px; }
        .message:hover .msg-actions { display: flex; }
        .msg-action-btn { background: transparent; color: var(--text-muted); border: none; padding: 4px 8px; cursor: pointer; font-size: 0.8rem; }
        .msg-action-btn:hover { background: var(--bg-input); color: var(--text-normal); }

        .msg-content { display: flex; flex-direction: column; width: 100%; }
        .msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
        .msg-username { color: var(--text-header); font-weight: 500; font-size: 1rem; }
        .msg-time { color: var(--text-muted); font-size: 0.75rem; }
        .msg-edited { font-size: 0.7rem; color: var(--text-muted); margin-left: 5px; }
        .msg-text { color: var(--text-normal); font-size: 0.95rem; line-height: 1.4; word-break: break-word; }
        
        .msg-image { max-width: 100%; max-height: 300px; border-radius: 8px; margin-top: 5px; object-fit: contain; background: var(--bg-tertiary); }
        
        .read-receipt { text-align: right; font-size: 0.75rem; color: var(--accent); padding-right: 16px; margin-top: 5px; margin-bottom: 10px; font-weight: bold; }

        #input-area { padding: 0 16px 24px 16px; }
        #message-form { display: flex; background: var(--bg-input); border-radius: 8px; padding: 10px 16px; align-items: center; gap: 10px; }
        #message-form input[type="text"] { flex: 1; background: transparent; border: none; padding: 0; color: var(--text-normal); font-size: 1rem; }
        #message-form button { display: none; }
        .upload-btn { background: transparent; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; border: none; padding: 0; }
        .upload-btn:hover { color: var(--text-normal); }

        /* --- Call Interface --- */
        .video-grid { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        video { background: #000; border-radius: 8px; width: 100%; max-width: 250px; aspect-ratio: 4/3; object-fit: cover; }
        .call-controls { display: flex; gap: 10px; justify-content: center; width: 100%; }
        .call-controls button { flex: 1; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; }
            #chat-area { display: none; width: 100%; }
            #app-container.chat-active #sidebar { display: none; }
            #app-container.chat-active #chat-area { display: flex; }
            #mobile-back-btn { display: block; }
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="auth-screen" class="modal-overlay">
        <div class="modal">
            <h2>Log In</h2>
            <form id="auth-form" class="form-col">
                <input type="text" id="auth-username" placeholder="Username (for Sign Up)">
                <input type="email" id="auth-email" placeholder="Email" required>
                <input type="password" id="auth-password" placeholder="Password" required>
                <button type="submit" id="btn-login">Log In</button>
                <button type="button" id="btn-signup" class="btn-secondary">Sign Up</button>
                <p id="auth-error" class="error"></p>
            </form>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal">
            <button id="close-settings" class="close-btn">✖</button>
            <h2>User Settings</h2>
            <div class="setting-group">
                <label>Profile Picture</label>
                <input type="file" id="avatar-upload" accept="image/*" style="width: 100%;">
            </div>
            <div class="setting-group">
                <label>App Theme</label>
                <div class="theme-buttons">
                    <button class="theme-btn" onclick="setTheme('dark')">Discord Dark</button>
                    <button class="theme-btn" onclick="setTheme('light')">Light Mode</button>
                    <button class="theme-btn" onclick="setTheme('hacker')">Hacker</button>
                    <button class="theme-btn" onclick="setTheme('sunset')">Sunset</button>
                    <button class="theme-btn" onclick="setTheme('naori')" style="grid-column: span 2; background: #00f5d4; color: #050a1f; font-weight: bold;">🌊 Naori Mode (Bioluminescent) 🌊</button>
                </div>
            </div>
            <button id="btn-logout" class="btn-secondary" style="width: 100%;">Log Out</button>
        </div>
    </div>

    <div id="call-modal" class="modal-overlay hidden">
        <div class="modal" style="max-width: 600px;">
            <h2 id="call-status">Calling...</h2>
            <div class="video-grid">
                <video id="local-video" autoplay playsinline muted></video>
                <video id="remote-video" autoplay playsinline></video>
            </div>
            <div class="call-controls">
                <button id="btn-answer-call" class="btn-success hidden">Answer</button>
                <button id="btn-end-call" class="btn-danger">Hang Up</button>
            </div>
        </div>
    </div>

    <div id="app-container" class="hidden">
        
        <div id="sidebar">
            <div class="sidebar-header">
                <span>Direct Messages</span>
            </div>
            <div id="user-list"></div>
            <div id="current-user-bar">
                <div id="my-avatar" class="avatar-frame">?</div>
                <div class="user-details"><strong id="my-username">Loading...</strong></div>
                <button id="btn-settings" class="icon-btn">⚙️</button>
            </div>
        </div>

        <div id="chat-area">
            <div class="chat-header">
                <button id="mobile-back-btn">←</button>
                <span style="color: var(--text-muted);">@</span>
                <span id="chat-title">Select a user</span>
                <div class="header-actions">
                    <button id="btn-start-call" class="hidden">📞 Call</button>
                </div>
            </div>
            
            <div id="pinned-bar">
                <div class="pinned-header">📌 Pinned Messages</div>
                <div id="pinned-content"></div>
            </div>

            <div id="messages-container">
                </div>
            
            <div id="input-area" class="hidden">
                <form id="message-form">
                    <label for="chat-image-upload" class="upload-btn">📷</label>
                    <input type="file" id="chat-image-upload" accept="image/*" class="hidden">
                    <input type="text" id="message-input" placeholder="Message..." autocomplete="off">
                    <button type="submit">Send</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, addDoc, onSnapshot, query, orderBy, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // TODO: PASTE YOUR FIREBASE CONFIG HERE
       const firebaseConfig = {
          apiKey: "AIzaSyDXmjZBRGqhSPSTTxTDappbJOaFerRQwBw",
          authDomain: "messenger-cfa6e.firebaseapp.com",
          projectId: "messenger-cfa6e",
          storageBucket: "messenger-cfa6e.firebasestorage.app",
          messagingSenderId: "710266615819",
          appId: "1:710266615819:web:cadeb12f54c0f861032f0e",
          measurementId: "G-8P070D3ENF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const GLOBAL_OBFUSCATION_KEY = "MySuperSecretAppPassword123!";

        let currentUser = null;
        let allUsersMap = {}; 
        let currentChatUser = null;
        let currentChatId = null;
        
        let unsubscribeChat = null;
        let unsubscribeMetaRealtime = null;
        let unsubscribeCallListener = null;
        let unreadListeners = []; 

        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };
        let pc = null, localStream = null, remoteStream = null, activeCallDocId = null, activeCallUnsubscribe = null;

        // --- NEW: REGISTER THE SERVICE WORKER ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('./sw.js').then(function(registration) {
                    console.log('ServiceWorker registration successful');
                }, function(err) {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }

        // --- IN-APP TOAST ENGINE ---
        function showToast(title, body, onClickCallback) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<div class="toast-title">${title}</div><div class="toast-body">${body}</div>`;
            
            toast.addEventListener('click', () => {
                if(onClickCallback) onClickCallback();
                toast.remove();
            });

            container.appendChild(toast);
            setTimeout(() => { if (toast.parentNode) { toast.classList.add('fade-out'); setTimeout(() => toast.remove(), 300); } }, 4000);
        }

        window.setTheme = function(themeName) {
            document.body.setAttribute('data-theme', themeName);
            localStorage.setItem('chat_theme', themeName);
        }
        setTheme(localStorage.getItem('chat_theme') || 'dark');

        document.getElementById('btn-settings').addEventListener('click', () => document.getElementById('settings-modal').classList.remove('hidden'));
        document.getElementById('close-settings').addEventListener('click', () => document.getElementById('settings-modal').classList.add('hidden'));

        document.getElementById('btn-signup').addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const username = document.getElementById('auth-username').value;
            if (!username) return document.getElementById('auth-error').textContent = "Username required";
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", cred.user.uid), { uid: cred.user.uid, email: email, username: username });
            } catch (error) { document.getElementById('auth-error').textContent = error.message; }
        });

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try { await signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-password').value); } 
            catch (error) { document.getElementById('auth-error').textContent = error.message; }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                
                // Request Permission immediately on login
                if ("Notification" in window && Notification.permission !== "granted") {
                    Notification.requestPermission();
                }

                loadUsers();
                listenForIncomingCalls();
            } else {
                currentUser = null;
                document.getElementById('app-container').classList.add('hidden');
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('settings-modal').classList.add('hidden');
                if (unsubscribeCallListener) unsubscribeCallListener();
                if (unsubscribeMetaRealtime) unsubscribeMetaRealtime();
                unreadListeners.forEach(unsub => unsub());
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        document.getElementById('avatar-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > 100) { height *= 100 / width; width = 100; } } 
                    else { if (height > 100) { width *= 100 / height; height = 100; } }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    if (currentUser) {
                        await setDoc(doc(db, "users", currentUser.uid), { avatar: canvas.toDataURL('image/jpeg', 0.8) }, { merge: true });
                        alert("Avatar updated!");
                    }
                }
            }
        });

        function getAvatarHTML(userData) { return userData?.avatar ? `<img src="${userData.avatar}">` : (userData?.username?.charAt(0).toUpperCase() || '?'); }
        function generateChatId(uid1, uid2) { return [uid1, uid2].sort().join('_'); }

        // --- LOAD USERS & NEW SYSTEM NOTIFICATIONS ---
        function loadUsers() {
            onSnapshot(collection(db, 'users'), (snapshot) => {
                const userList = document.getElementById('user-list');
                userList.innerHTML = ''; 
                unreadListeners.forEach(unsub => unsub());
                unreadListeners = [];

                snapshot.forEach((docSnap) => {
                    const userData = docSnap.data();
                    allUsersMap[userData.uid] = userData;
                    
                    if (userData.uid !== currentUser.uid) {
                        const userDiv = document.createElement('div');
                        userDiv.classList.add('user-item');
                        userDiv.id = `user-row-${userData.uid}`;
                        
                        userDiv.innerHTML = `
                            <div class="avatar-frame">${getAvatarHTML(userData)}</div> 
                            <span>${userData.username}</span>
                            <div class="unread-dot" id="dot-${userData.uid}"></div>
                        `;
                        userDiv.addEventListener('click', () => openChat(userData));
                        userList.appendChild(userDiv);

                        const chatId = generateChatId(currentUser.uid, userData.uid);
                        let previousUnreadState = false; 

                        const unsub = onSnapshot(doc(db, 'chats_meta', chatId), (metaSnap) => {
                            const metaData = metaSnap.data();
                            const dot = document.getElementById(`dot-${userData.uid}`);
                            const currentlyUnread = metaData && metaData.unreadBy === currentUser.uid;
                            
                            if (dot) dot.style.display = currentlyUnread ? 'block' : 'none';
                            
                            // --- NEW: THE ANDROID NOTIFICATION FIX ---
                            if (currentlyUnread && !previousUnreadState && currentChatId !== chatId) {
                                // 1. Show the in-app toast just in case they are looking at the screen
                                showToast(`New Message`, `From ${userData.username}`, () => openChat(userData));

                                // 2. Trigger the Android OS Notification using the Service Worker
                                if ("Notification" in window && Notification.permission === "granted") {
                                    navigator.serviceWorker.ready.then(function(registration) {
                                        registration.showNotification(`New Message from ${userData.username}`, {
                                            body: "Tap to open chat",
                                            icon: userData.avatar || null,
                                            vibrate: [200, 100, 200] // Makes the phone buzz!
                                        });
                                    });
                                }
                            }
                            previousUnreadState = currentlyUnread;
                        });
                        unreadListeners.push(unsub);

                    } else {
                        document.getElementById('my-username').textContent = userData.username;
                        document.getElementById('my-avatar').innerHTML = getAvatarHTML(userData);
                    }
                });
            });
        }

        document.getElementById('mobile-back-btn').addEventListener('click', () => document.getElementById('app-container').classList.remove('chat-active'));

        function openChat(targetUser) {
            currentChatUser = targetUser;
            currentChatId = generateChatId(currentUser.uid, targetUser.uid);
            document.getElementById('chat-title').textContent = targetUser.username;
            document.getElementById('input-area').classList.remove('hidden');
            document.getElementById('btn-start-call').classList.remove('hidden');
            document.getElementById('app-container').classList.add('chat-active');
            
            setDoc(doc(db, 'chats_meta', currentChatId), { unreadBy: null }, { merge: true });
            loadChatMessages();
        }

        window.editMessage = async function(msgId, oldText) {
            const newText = prompt("Edit your message:", oldText);
            if (newText !== null && newText.trim() !== "") {
                const newCipher = CryptoJS.AES.encrypt(newText.trim(), GLOBAL_OBFUSCATION_KEY).toString();
                await updateDoc(doc(db, 'chats', currentChatId, 'messages', msgId), { ciphertext: newCipher, isEdited: true });
            }
        };

        window.togglePin = async function(msgId, currentState) {
            await updateDoc(doc(db, 'chats', currentChatId, 'messages', msgId), { isPinned: !currentState });
        };

        function loadChatMessages() {
            const container = document.getElementById('messages-container');
            const pinnedBar = document.getElementById('pinned-bar');
            const pinnedContent = document.getElementById('pinned-content');
            
            if (unsubscribeChat) unsubscribeChat();
            if (unsubscribeMetaRealtime) unsubscribeMetaRealtime();

            let isMyLastMessage = false;
            let hasFriendRead = false;

            const updateReadReceiptUI = () => {
                let receiptEl = document.getElementById('dynamic-read-receipt');
                if (!receiptEl) {
                    receiptEl = document.createElement('div');
                    receiptEl.id = 'dynamic-read-receipt';
                    receiptEl.classList.add('read-receipt');
                    container.appendChild(receiptEl);
                }
                
                if (isMyLastMessage && hasFriendRead) {
                    receiptEl.textContent = 'Read';
                    receiptEl.style.display = 'block';
                } else {
                    receiptEl.style.display = 'none';
                }
            };

            unsubscribeMetaRealtime = onSnapshot(doc(db, 'chats_meta', currentChatId), (metaSnap) => {
                const metaData = metaSnap.data();
                hasFriendRead = metaData && metaData.unreadBy === null;
                updateReadReceiptUI();
            });

            const q = query(collection(db, 'chats', currentChatId, 'messages'), orderBy('createdAt', 'asc'));
            unsubscribeChat = onSnapshot(q, (snapshot) => {
                container.innerHTML = ''; 
                pinnedContent.innerHTML = '';
                let hasPins = false;
                let lastMessageData = null;

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const msgId = docSnap.id;
                    lastMessageData = data;

                    let decryptedText = "[Error]";
                    try { decryptedText = CryptoJS.AES.decrypt(data.ciphertext, GLOBAL_OBFUSCATION_KEY).toString(CryptoJS.enc.Utf8); } catch (e) {}
                    
                    let timeString = data.createdAt ? data.createdAt.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "Sending...";
                    const senderProfile = allUsersMap[data.senderId];
                    const isMe = data.senderId === currentUser.uid;

                    let contentHTML = '';
                    if (data.type === 'image') {
                        contentHTML = `<img src="${decryptedText}" class="msg-image" alt="Shared Image">`;
                    } else {
                        contentHTML = `<div class="msg-text">${decryptedText}</div>`;
                    }

                    let actionsHTML = `<div class="msg-actions">
                        <button class="msg-action-btn" onclick="togglePin('${msgId}', ${data.isPinned || false})">${data.isPinned ? 'Unpin' : 'Pin'}</button>`;
                    if (isMe && data.type !== 'image') {
                        const safeText = decryptedText.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                        actionsHTML += `<button class="msg-action-btn" onclick="editMessage('${msgId}', '${safeText}')">Edit</button>`;
                    }
                    actionsHTML += `</div>`;

                    const editedTag = data.isEdited ? `<span class="msg-edited">(edited)</span>` : '';

                    const msgHTML = `
                        ${actionsHTML}
                        <div class="avatar-frame">${getAvatarHTML(senderProfile)}</div>
                        <div class="msg-content">
                            <div class="msg-header">
                                <span class="msg-username" style="color: ${isMe ? 'var(--accent)' : 'var(--text-header)'}">${senderProfile?.username || 'Unknown'}</span>
                                <span class="msg-time">Today at ${timeString} ${editedTag}</span>
                            </div>
                            ${contentHTML}
                        </div>`;

                    const msgDiv = document.createElement('div');
                    msgDiv.classList.add('message');
                    msgDiv.innerHTML = msgHTML;
                    container.appendChild(msgDiv);

                    if (data.isPinned) {
                        hasPins = true;
                        const pinDiv = document.createElement('div');
                        pinDiv.classList.add('pinned-msg');
                        pinDiv.innerHTML = `<strong>${senderProfile?.username}:</strong> ${data.type === 'image' ? '[Image]' : decryptedText}`;
                        pinnedContent.appendChild(pinDiv);
                    }
                });

                pinnedBar.style.display = hasPins ? 'block' : 'none';
                isMyLastMessage = lastMessageData && lastMessageData.senderId === currentUser.uid;
                updateReadReceiptUI();
                container.scrollTop = container.scrollHeight;
            });
        }

        document.getElementById('message-form').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (text && currentChatId) {
                try {
                    await addDoc(collection(db, 'chats', currentChatId, 'messages'), {
                        type: 'text',
                        ciphertext: CryptoJS.AES.encrypt(text, GLOBAL_OBFUSCATION_KEY).toString(),
                        senderId: currentUser.uid,
                        createdAt: serverTimestamp(),
                        isPinned: false,
                        isEdited: false
                    });
                    
                    await setDoc(doc(db, 'chats_meta', currentChatId), { unreadBy: currentChatUser.uid }, { merge: true });
                    input.value = '';
                } catch (error) { console.error("Error sending:", error); }
            }
        });

        document.getElementById('chat-image-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file || !currentChatId) return;
            e.target.value = ''; 

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    const MAX_SIZE = 800; 
                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    
                    const base64Img = canvas.toDataURL('image/jpeg', 0.6); 
                    
                    try {
                        await addDoc(collection(db, 'chats', currentChatId, 'messages'), {
                            type: 'image',
                            ciphertext: CryptoJS.AES.encrypt(base64Img, GLOBAL_OBFUSCATION_KEY).toString(),
                            senderId: currentUser.uid,
                            createdAt: serverTimestamp(),
                            isPinned: false
                        });
                        
                        await setDoc(doc(db, 'chats_meta', currentChatId), { unreadBy: currentChatUser.uid }, { merge: true });
                    } catch (error) { console.error("Error sending image:", error); }
                }
            }
        });

        async function setupWebcam() {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            remoteStream = new MediaStream();
            document.getElementById('local-video').srcObject = localStream;
            document.getElementById('remote-video').srcObject = remoteStream;
            pc = new RTCPeerConnection(servers);
            localStream.getTracks().forEach((track) => pc.addTrack(track, localStream));
            pc.ontrack = (event) => event.streams[0].getTracks().forEach((track) => remoteStream.addTrack(track));
        }

        document.getElementById('btn-start-call').addEventListener('click', async () => {
            document.getElementById('call-modal').classList.remove('hidden');
            document.getElementById('call-status').textContent = "Calling " + currentChatUser.username + "...";
            document.getElementById('btn-answer-call').classList.add('hidden');
            await setupWebcam();
            const callDoc = doc(collection(db, 'calls'));
            activeCallDocId = callDoc.id;
            const offerCandidates = collection(callDoc, 'offerCandidates');
            const answerCandidates = collection(callDoc, 'answerCandidates');
            pc.onicecandidate = (event) => { if (event.candidate) addDoc(offerCandidates, event.candidate.toJSON()); };
            const offerDescription = await pc.createOffer();
            await pc.setLocalDescription(offerDescription);
            await setDoc(callDoc, { offer: { sdp: offerDescription.sdp, type: offerDescription.type }, callerId: currentUser.uid, receiverId: currentChatUser.uid, status: 'ringing' });
            activeCallUnsubscribe = onSnapshot(callDoc, (snapshot) => {
                const data = snapshot.data();
                if (!pc.currentRemoteDescription && data?.answer) { pc.setRemoteDescription(new RTCSessionDescription(data.answer)); document.getElementById('call-status').textContent = "In Call"; }
                if (data?.status === 'ended') endCall();
            });
            onSnapshot(answerCandidates, (snapshot) => { snapshot.docChanges().forEach((change) => { if (change.type === 'added') pc.addIceCandidate(new RTCIceCandidate(change.doc.data())); }); });
        });

        function listenForIncomingCalls() {
            unsubscribeCallListener = onSnapshot(collection(db, 'calls'), (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    const data = change.doc.data();
                    if (change.type === 'added' && data.receiverId === currentUser.uid && data.status === 'ringing') {
                        activeCallDocId = change.doc.id;
                        document.getElementById('call-modal').classList.remove('hidden');
                        document.getElementById('call-status').textContent = "Incoming Call...";
                        document.getElementById('btn-answer-call').classList.remove('hidden');
                        
                        // NEW: Android OS Call Notification
                        if ("Notification" in window && Notification.permission === "granted") {
                            navigator.serviceWorker.ready.then(function(registration) {
                                registration.showNotification("Incoming Video Call", {
                                    body: "Tap to answer",
                                    vibrate: [500, 250, 500, 250, 500] 
                                });
                            });
                        }
                    }
                    if (change.type === 'modified' && data.status === 'ended') endCall();
                });
            });
        }

        document.getElementById('btn-answer-call').addEventListener('click', async () => {
            document.getElementById('btn-answer-call').classList.add('hidden');
            document.getElementById('call-status').textContent = "Connecting...";
            await setupWebcam();
            const callDoc = doc(db, 'calls', activeCallDocId);
            pc.onicecandidate = (event) => { if (event.candidate) addDoc(collection(callDoc, 'answerCandidates'), event.candidate.toJSON()); };
            const callData = (await getDoc(callDoc)).data();
            await pc.setRemoteDescription(new RTCSessionDescription(callData.offer));
            const answerDescription = await pc.createAnswer();
            await pc.setLocalDescription(answerDescription);
            await updateDoc(callDoc, { answer: { type: answerDescription.type, sdp: answerDescription.sdp }, status: 'connected' });
            document.getElementById('call-status').textContent = "In Call";
            onSnapshot(collection(callDoc, 'offerCandidates'), (snapshot) => { snapshot.docChanges().forEach((change) => { if (change.type === 'added') pc.addIceCandidate(new RTCIceCandidate(change.doc.data())); }); });
        });

        document.getElementById('btn-end-call').addEventListener('click', () => { if (activeCallDocId) updateDoc(doc(db, 'calls', activeCallDocId), { status: 'ended' }); endCall(); });
        function endCall() {
            if (pc) { pc.close(); pc = null; }
            if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
            if (remoteStream) { remoteStream.getTracks().forEach(track => track.stop()); remoteStream = null; }
            if (activeCallUnsubscribe) activeCallUnsubscribe();
            document.getElementById('call-modal').classList.add('hidden');
            document.getElementById('local-video').srcObject = null;
            document.getElementById('remote-video').srcObject = null;
            activeCallDocId = null;
        }
    </script>
</body>
</html>
