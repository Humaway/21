<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANULChat</title>
    
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        :root {
            --bg-primary: #36393f; --bg-secondary: #2f3136; --bg-tertiary: #202225;
            --bg-input: #40444b; --text-normal: #dcddde; --text-muted: #72767d;
            --text-header: #ffffff; --accent: #5865F2; --accent-hover: #4752C4; --divider: #42464D;
        }

        [data-theme="light"] { --bg-primary: #ffffff; --bg-secondary: #f2f3f5; --bg-tertiary: #e3e5e8; --bg-input: #ebedef; --text-normal: #2e3338; --text-muted: #747f8d; --text-header: #060607; --accent: #5865F2; --divider: #e3e5e8; }
        [data-theme="hacker"] { --bg-primary: #0a0a0a; --bg-secondary: #000000; --bg-tertiary: #111111; --bg-input: #1a1a1a; --text-normal: #00ff00; --text-muted: #008800; --text-header: #00ff00; --accent: #00cc00; --divider: #222222; }
        [data-theme="sunset"] { --bg-primary: #2d1b2e; --bg-secondary: #1f1320; --bg-tertiary: #3a233b; --bg-input: #4a2d4b; --text-normal: #fcd5ce; --text-muted: #d8b4e2; --text-header: #ffb5a7; --accent: #ff9f1c; --divider: #5a375c; }
        [data-theme="anul"] { --bg-primary: #0a1128; --bg-secondary: #1c2541; --bg-tertiary: #050a1f; --bg-input: #2a3b5c; --text-normal: #80ffdb; --text-muted: #5390d9; --text-header: #ffffff; --accent: #00f5d4; --accent-hover: #00b4d8; --divider: #1a659e; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-primary); color: var(--text-normal); height: 100dvh; overflow: hidden; display: flex; justify-content: center; align-items: center; transition: background-color 0.3s; }
        #app-container { display: flex; width: 100vw; height: 100dvh; position: relative; }
        .hidden { display: none !important; }

        /* Global Incoming Call Banner */
        #global-call-banner { position: fixed; top: 0; left: 0; width: 100vw; background: #3ba55c; color: white; padding: 15px 20px; display: flex; justify-content: center; align-items: center; gap: 15px; z-index: 10000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transform: translateY(-100%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-weight: bold; }
        #global-call-banner.active { transform: translateY(0); }
        .banner-btns { display: flex; gap: 10px; }
        .banner-btns button { padding: 6px 12px; font-size: 0.9rem; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .btn-answer { background: #ffffff; color: #3ba55c; }
        .btn-decline { background: #ed4245; color: white; }

        /* Toast Notifications */
        #toast-container { position: fixed; top: 70px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; width: 300px; max-width: 90vw; }
        .toast { background: var(--bg-secondary); border-left: 4px solid var(--accent); color: var(--text-normal); padding: 15px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; animation: slideIn 0.3s ease-out; position: relative; overflow: hidden; }
        .toast-title { font-weight: bold; color: var(--text-header); margin-bottom: 5px; font-size: 0.95rem; }
        .toast-body { font-size: 0.85rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.fade-out { opacity: 0; transition: opacity 0.3s ease-out; }

        /* Image Lightbox */
        #lightbox { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(0,0,0,0.85); z-index: 10000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.2s ease-out; cursor: zoom-out; backdrop-filter: blur(5px); }
        #lightbox.active { opacity: 1; pointer-events: all; }
        #lightbox img { max-width: 95vw; max-height: 95dvh; border-radius: 8px; transform: scale(0.9); transition: transform 0.2s ease-out; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        #lightbox.active img { transform: scale(1); }

        /* Modals & Auth */
        .modal { background: var(--bg-secondary); padding: 40px; border-radius: 8px; width: 90%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 100; position: absolute; max-height: 90dvh; overflow-y: auto; }
        .modal h2 { color: var(--text-header); text-align: center; margin-bottom: 20px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 99; }
        .form-col { display: flex; flex-direction: column; gap: 15px; }
        input { background: var(--bg-tertiary); border: 1px solid var(--bg-tertiary); color: var(--text-normal); padding: 12px; border-radius: 4px; outline: none; font-size: 1rem; width: 100%;}
        input:focus { border-color: var(--accent); }
        input[type="color"] { padding: 2px; height: 40px; cursor: pointer; }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 4px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--bg-input); }
        .btn-secondary:hover { background: #4f545c; }
        .btn-danger { background: #ed4245; }
        .btn-success { background: #3ba55c; }
        .error { color: #ed4245; font-size: 0.85rem; text-align: center; }

        /* Settings Panel */
        .theme-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .theme-btn { padding: 8px; font-size: 0.9rem; background: var(--bg-input); }
        .setting-group { margin-bottom: 15px; border-bottom: 1px solid var(--divider); padding-bottom: 15px; }
        .setting-group label { display: block; color: var(--text-header); font-weight: bold; margin-bottom: 10px; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: transparent; color: var(--text-muted); font-size: 1.2rem; padding: 0; width: auto; }
        .save-settings-btn { background: #3ba55c; width: 100%; margin-top: 10px; }

        /* Avatar & Presence Status */
        .avatar-wrapper { position: relative; display: inline-block; flex-shrink: 0; margin-right: 12px; }
        .avatar-frame { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: var(--accent); display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 14px; overflow: hidden; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        .status-dot { position: absolute; bottom: -2px; right: -2px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--bg-secondary); background: #747f8d; z-index: 2; transition: background 0.3s; }
        .status-dot.online { background: #3ba55c; }
        .status-dot.offline { background: #747f8d; }

        /* Sidebar */
        #sidebar { width: 280px; background: var(--bg-secondary); display: flex; flex-direction: column; flex-shrink: 0; border-right: 1px solid var(--divider); }
        .sidebar-header { height: 48px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--bg-tertiary); font-weight: 600; color: var(--text-header); }
        .icon-btn { background: transparent; color: var(--text-muted); padding: 4px; font-size: 1.2rem; border-radius: 4px; cursor: pointer; }
        .sidebar-category { padding: 10px 16px 5px 16px; font-size: 0.75rem; font-weight: bold; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        #user-list { flex: 1; overflow-y: auto; padding: 0 8px 8px 8px; }
        .user-item { display: flex; align-items: center; padding: 8px; margin-bottom: 2px; border-radius: 4px; cursor: pointer; color: var(--text-muted); transition: background 0.1s; position: relative; }
        .user-item:hover { background: var(--bg-input); color: var(--text-normal); }
        
        .calling-icon { margin-left: auto; margin-right: 25px; color: #3ba55c; font-size: 1.2rem; display: none; animation: ringPulse 1s infinite; }
        @keyframes ringPulse { 0% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.2) rotate(15deg); } 100% { transform: scale(1) rotate(0deg); } }

        .unread-dot { width: 12px; height: 12px; background-color: #ff3b30; border-radius: 50%; position: absolute; right: 15px; display: none; box-shadow: 0 0 8px #ff3b30; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(255, 59, 48, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); } }

        #current-user-bar { background: var(--bg-tertiary); padding: 10px 16px; display: flex; align-items: center; gap: 10px; }
        .user-details { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .user-details strong { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Chat Area */
        #chat-area { flex: 1; background: var(--bg-primary); display: flex; flex-direction: column; min-width: 0; }
        .chat-header { height: 48px; padding: 0 16px; display: flex; align-items: center; border-bottom: 1px solid var(--divider); font-weight: 600; color: var(--text-header); gap: 10px; flex-shrink: 0; background: var(--bg-primary); z-index: 5;}
        #mobile-back-btn { display: none; background: transparent; padding: 5px; color: var(--text-muted); }
        .header-actions { margin-left: auto; display: flex; gap: 10px; }
        #btn-start-call { background: var(--bg-tertiary); color: var(--text-normal); padding: 6px 12px; font-size: 0.85rem; border-radius: 4px; display: flex; align-items: center; gap: 5px; }
        #btn-join-call { background: #3ba55c; color: white; padding: 6px 12px; font-size: 0.85rem; border-radius: 4px; display: flex; align-items: center; gap: 5px; animation: glowJoin 2s infinite; }
        @keyframes glowJoin { 0% { box-shadow: 0 0 5px #3ba55c; } 50% { box-shadow: 0 0 15px #3ba55c; } 100% { box-shadow: 0 0 5px #3ba55c; } }

        /* Dynamic Mesh Video Panel */
        #call-panel { background: var(--bg-tertiary); border-bottom: 1px solid var(--divider); padding: 15px; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 4; transition: all 0.3s ease; max-height: 30vh; }
        #call-panel.fullscreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; max-height: none; z-index: 9999; border-radius: 0; }
        .call-panel-header { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        
        .video-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; width: 100%; flex: 1; overflow-y: auto; padding-bottom: 5px; }
        .video-wrapper { position: relative; flex: 1 1 150px; max-width: 45%; max-height: 100%; border-radius: 8px; overflow: hidden; background: #0b0b0b; border: 1px solid var(--divider); box-shadow: 0 2px 8px rgba(0,0,0,0.5); aspect-ratio: 16/9; display: flex; justify-content: center; align-items: center; }
        .video-wrapper video { width: 100%; height: 100%; object-fit: contain; }
        .fullscreen .video-wrapper { max-width: 40vw; max-height: 45vh; }
        #local-video { transform: scaleX(-1); }

        .video-name-badge { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.7); color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; z-index: 2; pointer-events: none; display: flex; align-items: center; gap: 5px; }
        .status-icon { display: none; }
        .status-icon.muted { display: inline-block; color: #ed4245; }

        .call-controls { display: flex; gap: 10px; align-items: center; }
        .call-controls button { padding: 6px 12px; font-size: 0.85rem; }
        #btn-fullscreen { background: transparent; color: var(--text-normal); font-size: 1.2rem; padding: 4px; width: auto; }
        #btn-fullscreen:hover { background: var(--bg-input); }

        /* Messages */
        #pinned-bar { background: var(--bg-secondary); border-bottom: 1px solid var(--divider); padding: 10px 16px; max-height: 100px; overflow-y: auto; font-size: 0.85rem; color: var(--text-muted); display: none; flex-shrink: 0; }
        .pinned-msg { border-left: 3px solid var(--accent); padding-left: 10px; margin-bottom: 5px; background: var(--bg-tertiary); padding: 5px 10px; border-radius: 4px; cursor: pointer; transition: background 0.1s; }
        .pinned-msg:hover { background: var(--bg-input); }
        .pinned-header { font-weight: bold; color: var(--text-header); margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }

        #messages-container { flex: 1; overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column; position: relative; scroll-behavior: smooth; }
        .message { display: flex; padding: 8px 16px; margin-top: 8px; position: relative; -webkit-touch-callout: none; transition: background 0.2s; }
        .message:hover, .message.highlight { background: rgba(4, 4, 5, 0.07); }
        .message.highlight { background: rgba(88, 101, 242, 0.2); }
        
        .msg-actions { position: absolute; right: 16px; top: -15px; background: var(--bg-secondary); border: 1px solid var(--divider); border-radius: 8px; display: none; padding: 2px; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.2); align-items: center;}
        .message:hover .msg-actions, .message.show-actions .msg-actions { display: flex; }
        .msg-action-btn { background: transparent; color: var(--text-muted); border: none; padding: 6px; cursor: pointer; font-size: 1rem; border-radius: 4px; }
        .msg-action-btn:hover { background: var(--bg-input); color: var(--text-normal); }
        .quick-reacts { display: flex; border-right: 1px solid var(--divider); margin-right: 4px; padding-right: 4px; }

        .msg-content { display: flex; flex-direction: column; width: 100%; min-width: 0; }
        .msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
        .msg-username { font-weight: 500; font-size: 1rem; }
        .msg-time { color: var(--text-muted); font-size: 0.75rem; }
        .msg-edited { font-size: 0.7rem; color: var(--text-muted); margin-left: 5px; }
        .msg-text { color: var(--text-normal); font-size: 0.95rem; line-height: 1.4; word-break: break-word; }
        
        .quoted-message { font-size: 0.8rem; color: var(--text-muted); border-left: 2px solid var(--divider); padding-left: 8px; margin-bottom: 4px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 5px; transition: color 0.1s;}
        .quoted-message:hover { color: var(--text-normal); }
        .quoted-message::before { content: "↪"; color: var(--accent); font-weight: bold; }

        .reactions-container { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
        .reaction-badge { background: var(--bg-tertiary); border: 1px solid var(--divider); color: var(--text-normal); padding: 2px 6px; border-radius: 12px; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 4px; user-select: none; }
        .reaction-badge.active { background: rgba(88, 101, 242, 0.2); border-color: var(--accent); }

        .msg-image { max-width: 100%; max-height: 300px; border-radius: 8px; margin-top: 5px; object-fit: contain; background: var(--bg-tertiary); cursor: zoom-in; }
        .read-receipt { text-align: right; font-size: 0.75rem; color: var(--accent); padding-right: 16px; margin-top: 5px; margin-bottom: 10px; font-weight: bold; }

        #input-area { padding: 0 16px 24px 16px; flex-shrink: 0; position: relative; }
        #reply-banner { background: var(--bg-secondary); border-radius: 8px 8px 0 0; padding: 8px 16px; font-size: 0.85rem; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; margin-bottom: -5px; border: 1px solid var(--divider); border-bottom: none; z-index: 1;}
        #reply-banner-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; margin-right: 10px;}
        #cancel-reply-btn { background: transparent; color: var(--text-normal); border: none; cursor: pointer; font-weight: bold;}

        #typing-indicator { position: absolute; top: -20px; left: 20px; font-size: 0.8rem; color: var(--text-muted); font-weight: bold; height: 15px; }

        #message-form { display: flex; background: var(--bg-input); border-radius: 8px; padding: 10px 16px; align-items: center; gap: 10px; position: relative; z-index: 2;}
        .is-replying #message-form { border-radius: 0 0 8px 8px; }
        #message-form input[type="text"] { flex: 1; background: transparent; border: none; padding: 0; color: var(--text-normal); font-size: 1rem; }
        #message-form button { display: none; }
        .upload-btn { background: transparent; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; border: none; padding: 0; }
        .upload-btn:hover { color: var(--text-normal); }

        @media (max-width: 768px) {
            #sidebar { width: 100%; }
            #chat-area { display: none; width: 100%; }
            #app-container.chat-active #sidebar { display: none; }
            #app-container.chat-active #chat-area { display: flex; }
            #mobile-back-btn { display: block; }
            .video-wrapper { max-width: 100%; }
        }
    </style>
</head>
<body>

    <div id="global-call-banner">
        <span style="font-size: 1.2rem;">📞</span>
        <span>Incoming Video Call from <span id="banner-caller-name">Someone</span></span>
        <div class="banner-btns">
            <button class="btn-answer" onclick="answerGlobalCall()">Answer</button>
            <button class="btn-decline" onclick="declineGlobalCall()">Decline</button>
        </div>
    </div>

    <div id="lightbox" onclick="closeLightbox()"><img id="lightbox-img" src="" alt="Expanded View"></div>
    <div id="toast-container"></div>

    <div id="auth-screen" class="modal-overlay">
        <div class="modal">
            <h2>ANULChat</h2>
            <form id="auth-form" class="form-col">
                <input type="text" id="auth-username" placeholder="Username (for Sign Up)">
                <input type="email" id="auth-email" placeholder="Email" required>
                <input type="password" id="auth-password" placeholder="Password" required>
                <button type="submit" id="btn-login">Log In</button>
                <button type="button" id="btn-signup" class="btn-secondary">Sign Up</button>
                <p id="auth-error" class="error"></p>
            </form>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal">
            <button id="close-settings" class="close-btn">✖</button>
            <h2>User Settings</h2>
            <div class="setting-group">
                <label>Profile Picture</label>
                <input type="file" id="avatar-upload" accept="image/*" style="width: 100%;">
            </div>
            <div class="setting-group">
                <label>Display Name</label>
                <input type="text" id="settings-username-input" placeholder="Update Username">
            </div>
            <div class="setting-group">
                <label>Name Color</label>
                <input type="color" id="settings-color-input" value="#ffffff">
            </div>
            <div class="setting-group">
                <label>Notifications</label>
                <label style="font-weight: normal; font-size: 0.9rem; display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" id="settings-mute-group" style="width: auto; transform: scale(1.2);">
                    Mute General Chat Notifications
                </label>
            </div>
            <div class="setting-group">
                <label>App Theme</label>
                <div class="theme-buttons">
                    <button class="theme-btn" onclick="setTheme('dark')">Discord Dark</button>
                    <button class="theme-btn" onclick="setTheme('light')">Light Mode</button>
                    <button class="theme-btn" onclick="setTheme('hacker')">Hacker</button>
                    <button class="theme-btn" onclick="setTheme('sunset')">Sunset</button>
                    <button class="theme-btn" onclick="setTheme('anul')" style="grid-column: span 2; background: #00f5d4; color: #050a1f; font-weight: bold;">🌊 ANUL Mode 🌊</button>
                </div>
            </div>
            <button id="btn-save-profile" class="save-settings-btn">Save Profile Updates</button>
            <button id="btn-logout" class="btn-secondary" style="width: 100%; margin-top: 10px;">Log Out</button>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <div id="sidebar">
            <div class="sidebar-header">
                <span>ANULChat Server</span>
            </div>
            <div class="sidebar-category">Channels</div>
            <div id="channel-list" style="padding: 0 8px;">
                <div class="user-item" onclick="openGroupChat()">
                    <div class="avatar-wrapper"><div class="avatar-frame">#</div></div>
                    <span style="font-weight: 500; color: var(--text-normal);">General Chat</span>
                </div>
            </div>
            <div class="sidebar-category" style="margin-top: 10px;">Direct Messages</div>
            <div id="user-list"></div>
            
            <div id="current-user-bar">
                <div class="avatar-wrapper" style="margin-right: 10px;">
                    <div id="my-avatar" class="avatar-frame">?</div>
                    <div id="my-status-dot" class="status-dot online"></div>
                </div>
                <div class="user-details"><strong id="my-username" style="color: white;">Loading...</strong></div>
                <button id="btn-settings" class="icon-btn">⚙️</button>
            </div>
        </div>

        <div id="chat-area">
            <div class="chat-header">
                <button id="mobile-back-btn">←</button>
                <span id="chat-type-icon" style="color: var(--text-muted);">@</span>
                <span id="chat-title">Select a user</span>
                <div class="header-actions">
                    <button id="btn-join-call" class="hidden" onclick="rtcManager.join(false)">📞 Join Call</button>
                    <button id="btn-start-call" class="hidden" onclick="rtcManager.join(true)">📞 Start Call</button>
                </div>
            </div>
            
            <div id="call-panel" class="hidden">
                <div class="call-panel-header">
                    <span id="call-status" style="font-weight: bold; color: var(--accent); font-size: 1.1rem;">In Call</span>
                    <div class="call-controls">
                        <button id="btn-toggle-mic" class="btn-secondary" onclick="rtcManager.toggleMic()">🎤 Mute</button>
                        <button id="btn-toggle-video" class="btn-secondary" onclick="rtcManager.toggleVideo()">📷 Stop Video</button>
                        <button id="btn-fullscreen" onclick="toggleFullscreen()">⛶</button>
                        <button id="btn-end-call" class="btn-danger" onclick="rtcManager.leave()">Hang Up</button>
                    </div>
                </div>
                <div class="video-grid" id="video-grid">
                    </div>
            </div>

        function unlockAudio() {
            if (audioUnlocked) return;
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                gain.gain.value = 0; // Silent note to force browser unlock
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(0);
                osc.stop(0.01);
                
                audioUnlocked = true;
            } catch (e) { console.log("Audio unlock failed:", e); }
        }

        // Listen for any interaction to unlock audio
        ['click', 'touchstart', 'keydown'].forEach(evt => document.body.addEventListener(evt, unlockAudio, {once:true}));

        function initAudio() { 
            try {
                if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } 
                if (audioCtx.state === 'suspended') { audioCtx.resume(); } 
            } catch(e) {}
        }

        function playNote(freq, time, duration) {
            try {
                if (!audioCtx) return; 
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, time); gain.gain.setValueAtTime(0, time);
                gain.gain.linearRampToValueAtTime(0.2, time + 0.02); gain.gain.linearRampToValueAtTime(0, time + duration);
                osc.start(time); osc.stop(time + duration);
            } catch(e) {}
        }

        function playRingtone() { 
            try {
                initAudio(); 
                if (ringtoneInterval) clearInterval(ringtoneInterval); 
                function playPattern() { 
                    try {
                        const t = audioCtx.currentTime; 
                        for(let i=0; i<8; i++) { playNote(400, t + (i * 0.12), 0.08); } 
                        playNote(600, t + 1.0, 0.15); playNote(500, t + 1.2, 0.15); 
                        playNote(600, t + 1.5, 0.15); playNote(500, t + 1.7, 0.15); 
                    } catch(e){}
                } 
                playPattern(); 
                ringtoneInterval = setInterval(playPattern, 2200); 
            } catch(e) {}
        }

        function playDialingSound() {

                playPattern(); 
                ringtoneInterval = setInterval(playPattern, 3000); 
            } catch(e) {}
        }

        }

        function urlBase64ToUint8Array(base64String) { const padding = '='.repeat((4 - base64String.length % 4) % 4); const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/'); const rawData = window.atob(base64); const outputArray = new Uint8Array(rawData.length); for (let i = 0; i < rawData.length; ++i) { outputArray[i] = rawData.charCodeAt(i); } return outputArray; }

        // ==========================================

        function getAvatarHTML(userData) { return userData?.avatar ? `<img src="${userData.avatar}">` : (userData?.username?.charAt(0).toUpperCase() || '?'); }
        function generateChatId(uid1, uid2) { return [uid1, uid2].sort().join('_'); }

        function loadUsers() {
            onSnapshot(collection(db, 'users'), (snapshot) => {
                const userList = document.getElementById('user-list'); userList.innerHTML = ''; 
                unreadListeners.forEach(unsub => unsub()); unreadListeners = [];

                snapshot.forEach((docSnap) => {
                    const userData = docSnap.data(); allUsersMap[userData.uid] = userData;
                    if (userData.uid !== currentUser.uid) {
                        const userDiv = document.createElement('div'); userDiv.classList.add('user-item'); userDiv.id = `sidebar-user-${userData.uid}`;
                        userDiv.innerHTML = `<div class="avatar-wrapper"><div class="avatar-frame">${getAvatarHTML(userData)}</div><div class="status-dot ${userData.status || 'offline'}"></div></div><span style="color: ${userData.nameColor || 'var(--text-normal)'}; font-weight: 500;">${userData.username}</span><span class="calling-icon" id="call-icon-${userData.uid}">📞</span><div class="unread-dot" id="dot-${userData.uid}"></div>`;
                        userDiv.addEventListener('click', () => openChat(userData)); userList.appendChild(userDiv);

                        const chatId = generateChatId(currentUser.uid, userData.uid); let previousUnreadState = false; 
                        
                        const unsub = onSnapshot(doc(db, 'chats_meta', chatId), (metaSnap) => {

                            // Trigger Incoming Ring

            });

            if (unsubscribeGroupMeta) unsubscribeGroupMeta();

                const data = docSnap.data();
                if (data && data.lastSenderId && data.lastSenderId !== currentUser.uid) {

        document.getElementById('mobile-back-btn').addEventListener('click', () => document.getElementById('app-container').classList.remove('chat-active'));

        // ==========================================

        const rtcManager = {
            peers: {}, 
            localStream: null,

            async setupMedia() {
                const constraints = { video: { width: { ideal: 320 }, height: { ideal: 240 }, frameRate: { ideal: 15, max: 24 } }, audio: true };
                try {
                    this.localStream = await navigator.mediaDevices.getUserMedia(constraints);
                    document.getElementById('video-grid').innerHTML = `
                        <div class="video-wrapper" id="wrapper-local">

                        </div>`;
                    document.getElementById('local-video').srcObject = this.localStream;
                } catch(e) { showToast("Hardware Error", "Could not access Camera/Mic"); }
            },

            toggleMic() {
                if(!this.localStream) return;
                const track = this.localStream.getAudioTracks()[0];
                if(track) {
                    track.enabled = !track.enabled;
                    const btn = document.getElementById('btn-toggle-mic');

                        btn.textContent = '🎤 Mute'; btn.classList.remove('btn-danger'); icon.style.display = 'none'; this.broadcastState({audioMuted: false});

                        btn.textContent = '🚫 Start Video'; btn.classList.add('btn-danger'); icon.style.display = 'inline-block'; this.broadcastState({videoMuted: true});
                    }
                }
            },

            async broadcastState(stateObj) {
                if(this.chatId && currentUser) { await updateDoc(doc(db, `chats/${this.chatId}/participants`, currentUser.uid), stateObj).catch(e=>{}); }
            },

            async join(isInitiator = false) {
                if (!currentChatId) return;
                this.chatId = currentChatId;
                
                if (isInitiator && !currentChatUser.isGroup) playDialingSound(); 
                else playPickupSound(); 

                document.getElementById('call-panel').classList.remove('hidden');
                document.getElementById('btn-join-call').classList.add('hidden');
                document.getElementById('btn-start-call').classList.add('hidden');
                
                await this.setupMedia();

                const metaPayload = { callActive: true };
                if (!currentChatUser.isGroup) { metaPayload.ringing = isInitiator ? currentChatUser.uid : null; }
                await setDoc(doc(db, 'chats_meta', this.chatId), metaPayload, {merge:true});

                await setDoc(doc(db, `chats/${this.chatId}/participants`, currentUser.uid), { joined: serverTimestamp(), audioMuted: false, videoMuted: false });

                const signalsRef = collection(db, `chats/${this.chatId}/signals`);
                const q = query(signalsRef, where('to', '==', currentUser.uid));
                this.unsubs.push(onSnapshot(q, snap => {
                    snap.docChanges().forEach(change => {
                        if (change.type === 'added') {
                            this.handleSignal(change.doc.data());
                            deleteDoc(doc(db, `chats/${this.chatId}/signals`, change.doc.id)).catch(e=>{}); 
                        }
                    });
                }));

                const pColl = collection(db, `chats/${this.chatId}/participants`);
                this.unsubs.push(onSnapshot(pColl, snap => {
                    snap.docChanges().forEach(change => {
                        if (change.type === 'added' && change.doc.id !== currentUser.uid) {
                            stopRingtone(); 
                            if (!currentChatUser.isGroup && !isInitiator) playPickupSound(); 
                            
                            this.createPeer(change.doc.id);
                            if (currentUser.uid > change.doc.id) { this.initiatePeer(change.doc.id); }
                        }
                        if (change.type === 'modified' && change.doc.id !== currentUser.uid) {
                            const data = change.doc.data();
                            const micIcon = document.getElementById(`mute-icon-${change.doc.id}`);
                            const vidIcon = document.getElementById(`video-icon-${change.doc.id}`);
                            if(micIcon) micIcon.style.display = data.audioMuted ? 'inline-block' : 'none';
                            if(vidIcon) vidIcon.style.display = data.videoMuted ? 'inline-block' : 'none';
                        }
                        if (change.type === 'removed' && change.doc.id !== currentUser.uid) {
                            this.removePeer(change.doc.id);
                        }
                    });
                }));
            },

            createPeer(remoteUid) {
                if (this.peers[remoteUid]) return this.peers[remoteUid];
                const pc = new RTCPeerConnection(this.servers);
                if (this.localStream) {
                    this.localStream.getTracks().forEach(track => pc.addTrack(track, this.localStream));
                }
                pc.onicecandidate = event => { if (event.candidate) { addDoc(collection(db, `chats/${this.chatId}/signals`), { from: currentUser.uid, to: remoteUid, type: 'candidate', candidate: event.candidate.toJSON() }); } };

                const remoteStream = new MediaStream();
                const wrapper = document.createElement('div');
                wrapper.className = 'video-wrapper'; wrapper.id = `wrapper-${remoteUid}`;
                const userName = allUsersMap[remoteUid]?.username || 'Unknown';
                wrapper.innerHTML = `
                    <video id="video-${remoteUid}" autoplay playsinline></video>
                    <div class="video-name-badge">${userName} 
                        <span class="status-icon muted" id="mute-icon-${remoteUid}">🔇</span>
                        <span class="status-icon muted" id="video-icon-${remoteUid}">🚫</span>
                    </div>
                `;
                document.getElementById('video-grid').appendChild(wrapper);
                document.getElementById(`video-${remoteUid}`).srcObject = remoteStream;

                pc.ontrack = event => { event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track)); };
                this.peers[remoteUid] = pc; return pc;
            },

            async initiatePeer(remoteUid) {
                try {
                    const pc = this.createPeer(remoteUid);
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    await addDoc(collection(db, `chats/${this.chatId}/signals`), { from: currentUser.uid, to: remoteUid, type: 'offer', sdp: offer.sdp });
                } catch(e) { console.error("Peer Initiation Failed", e); }
            },

            async handleSignal(data) {
                if (!this.chatId) return; 
                const remoteUid = data.from;
                let pc = this.peers[remoteUid];
                if (!pc) pc = this.createPeer(remoteUid);

                try {
                    if (data.type === 'offer') {
                        await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: data.sdp }));
                        const answer = await pc.createAnswer();
                        await pc.setLocalDescription(answer);
                        await addDoc(collection(db, `chats/${this.chatId}/signals`), { from: currentUser.uid, to: remoteUid, type: 'answer', sdp: answer.sdp });
                    } else if (data.type === 'answer') {
                        await pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: data.sdp }));
                    } else if (data.type === 'candidate') {
                        await pc.addIceCandidate(new RTCIceCandidate(data.candidate)).catch(e=>{});
                    }
                } catch(e) { console.error("Signal Handling Failed", e); }
            },

            removePeer(remoteUid) {
                if (this.peers[remoteUid]) { this.peers[remoteUid].close(); delete this.peers[remoteUid]; }
                const wrapperEl = document.getElementById(`wrapper-${remoteUid}`);
                if (wrapperEl) wrapperEl.remove();

                if (!currentChatUser.isGroup && Object.keys(this.peers).length === 0) { this.leave(); }
            },

            async leave() {
                stopRingtone(); playHangupSound();
                
                document.getElementById('call-panel').classList.add('hidden');
                document.getElementById('call-panel').classList.remove('fullscreen');

                if (this.localStream) { this.localStream.getTracks().forEach(t => t.stop()); this.localStream = null; }
                
                Object.values(this.peers).forEach(pc => pc.close()); this.peers = {};
                document.getElementById('video-grid').innerHTML = '';
                this.unsubs.forEach(unsub => unsub()); this.unsubs = [];

                if (this.chatId) {
                    await deleteDoc(doc(db, `chats/${this.chatId}/participants`, currentUser.uid)).catch(e=>{});
                    getDoc(doc(db, 'chats_meta', this.chatId)).then(snap => { updateDoc(doc(db, 'chats_meta', this.chatId), { ringing: null }).catch(e=>{}); });
                    this.chatId = null;
                }
            },

            handleIncomingRing(callerUid, chatId) {
                if (this.globalIncomingCallId === chatId) return; 
                this.globalIncomingCallId = chatId;
                this.globalIncomingCaller = allUsersMap[callerUid];

                // ALWAYS trigger UI first before Audio to prevent blocking
                const callerIcon = document.getElementById(`call-icon-${callerUid}`);
                if (callerIcon) callerIcon.style.display = 'block';

                document.getElementById('banner-caller-name').textContent = this.globalIncomingCaller?.username || 'Unknown';
                document.getElementById('global-call-banner').classList.add('active');

                playRingtone(); // Might fail if user hasn't clicked yet, but UI is safe!
                
                if (currentUser.pushSubscription && VERCEL_API_URL !== "https://YOUR-VERCEL-PROJECT-NAME.vercel.app/api/notify") {
                    fetch(VERCEL_API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ subscription: currentUser.pushSubscription, title: "Incoming Video Call", body: "Tap to answer", icon: null }) }).catch(e=>{});
                }
            },

            clearIncomingRing() {
                stopRingtone();
                document.getElementById('global-call-banner').classList.remove('active');
                if (this.globalIncomingCaller) {
                    const callerIcon = document.getElementById(`call-icon-${this.globalIncomingCaller.uid}`);
                    if (callerIcon) callerIcon.style.display = 'none';
                }
                this.globalIncomingCallId = null; this.globalIncomingCaller = null;
            },

            answerGlobal() {
                if (!this.globalIncomingCaller || !this.globalIncomingCallId) return;
                this.clearIncomingRing();
                openChat(this.globalIncomingCaller);
                this.join(false); 
            },

            declineGlobal() {
                if (this.globalIncomingCallId) { updateDoc(doc(db, 'chats_meta', this.globalIncomingCallId), { ringing: null }).catch(e=>{}); }
                this.clearIncomingRing();
                playHangupSound();
            }
        };

        window.rtcManager = rtcManager; 
        window.answerGlobalCall = () => rtcManager.answerGlobal();
        window.declineGlobalCall = () => rtcManager.declineGlobal();

        // ==========================================
        // CHAT INIT & TEXT LOGIC
        // ==========================================
        let replyingToMsg = null; let typingTimeout = null;

        function openChat(targetUser) {
            currentChatUser = targetUser;
            currentChatUser.isGroup = false;
            currentChatId = generateChatId(currentUser.uid, targetUser.uid);
            document.getElementById('chat-type-icon').textContent = '@';
            document.getElementById('chat-title').textContent = targetUser.username;
            document.getElementById('chat-title').style.color = targetUser.nameColor || 'var(--text-header)';
            document.getElementById('input-area').classList.remove('hidden');
            document.getElementById('app-container').classList.add('chat-active');
            cancelReply();
            getDoc(doc(db, 'chats_meta', currentChatId)).then(snap => { if (snap.exists() && snap.data().unreadBy === currentUser.uid) { updateDoc(doc(db, 'chats_meta', currentChatId), { unreadBy: null }); } });
            loadChatMessages();
        }

        window.openGroupChat = function() {
            currentChatUser = { uid: 'general', username: 'General Chat', isGroup: true };
            currentChatId = 'group_general';
            document.getElementById('chat-type-icon').textContent = '#';
            document.getElementById('chat-title').textContent = 'General Chat';
            document.getElementById('chat-title').style.color = 'var(--text-header)';
            document.getElementById('input-area').classList.remove('hidden');
            document.getElementById('app-container').classList.add('chat-active');
            cancelReply();
            loadChatMessages(); 
        }

        document.getElementById('message-input').addEventListener('input', () => {
            if (!currentChatId) return;
            if (!currentChatUser.isGroup) {
                setDoc(doc(db, 'chats_meta', currentChatId), { typing: currentUser.uid }, { merge: true });
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => { setDoc(doc(db, 'chats_meta', currentChatId), { typing: null }, { merge: true }); }, 2000);
            }
        });

        let pressTimer;
        window.handleTouchStart = function(e, msgId) { pressTimer = window.setTimeout(() => { const el = document.getElementById(`msg-${msgId}`); if(el) { el.classList.toggle('show-actions'); if (navigator.vibrate) navigator.vibrate(50); } }, 500); };
        window.handleTouchEnd = function() { clearTimeout(pressTimer); }; window.handleTouchMove = function() { clearTimeout(pressTimer); }; 
        window.startReply = function(msgId, text) { replyingToMsg = { id: msgId, text: text }; document.getElementById('reply-banner-text').textContent = "Replying to: " + text; document.getElementById('reply-banner').classList.remove('hidden'); document.getElementById('input-area').classList.add('is-replying'); document.getElementById('message-input').focus(); };
        window.cancelReply = function() { replyingToMsg = null; document.getElementById('reply-banner').classList.add('hidden'); document.getElementById('input-area').classList.remove('is-replying'); };
        window.editMessage = async function(msgId, oldText) { const newText = prompt("Edit your message:", oldText); if (newText !== null && newText.trim() !== "") { const newCipher = CryptoJS.AES.encrypt(newText.trim(), GLOBAL_OBFUSCATION_KEY).toString(); await updateDoc(doc(db, 'chats', currentChatId, 'messages', msgId), { ciphertext: newCipher, isEdited: true }); } };
        window.togglePin = async function(msgId, currentState) { await updateDoc(doc(db, 'chats', currentChatId, 'messages', msgId), { isPinned: !currentState }); };
        window.toggleReaction = async function(msgId, emoji) { const msgRef = doc(db, 'chats', currentChatId, 'messages', msgId); const msgSnap = await getDoc(msgRef); if (msgSnap.exists()) { const data = msgSnap.data(); let reactions = data.reactions || {}; if (!reactions[emoji]) reactions[emoji] = []; const userIndex = reactions[emoji].indexOf(currentUser.uid); if (userIndex > -1) { reactions[emoji].splice(userIndex, 1); } else { reactions[emoji].push(currentUser.uid); } await updateDoc(msgRef, { reactions: reactions }); } };

        function loadChatMessages() {
            const container = document.getElementById('messages-container'); const pinnedBar = document.getElementById('pinned-bar'); const pinnedContent = document.getElementById('pinned-content'); const typingInd = document.getElementById('typing-indicator');
            if (unsubscribeChat) unsubscribeChat(); if (unsubscribeMetaRealtime) unsubscribeMetaRealtime();
            let isMyLastMessage = false; let hasFriendRead = false; let isFirstLoad = true;

            const updateReadReceiptUI = () => {
                if (currentChatUser && currentChatUser.isGroup) return; 
                let receiptEl = document.getElementById('dynamic-read-receipt');
                if (!receiptEl) { receiptEl = document.createElement('div'); receiptEl.id = 'dynamic-read-receipt'; receiptEl.classList.add('read-receipt'); container.appendChild(receiptEl); }
                if (isMyLastMessage && hasFriendRead) { receiptEl.textContent = 'Read'; receiptEl.style.display = 'block'; } else { receiptEl.style.display = 'none'; }
            };

            unsubscribeMetaRealtime = onSnapshot(doc(db, 'chats_meta', currentChatId), (metaSnap) => {
                const metaData = metaSnap.data();
                
                const btnStart = document.getElementById('btn-start-call');
                const btnJoin = document.getElementById('btn-join-call');
                if (metaData && metaData.callActive && !rtcManager.chatId) {
                    btnJoin.classList.remove('hidden'); btnStart.classList.add('hidden');
                } else if (!rtcManager.chatId) {
                    btnJoin.classList.add('hidden'); btnStart.classList.remove('hidden');
                } else {
                    btnJoin.classList.add('hidden'); btnStart.classList.add('hidden');
                }

                if (!currentChatUser.isGroup) {
                    if (metaData && metaData.unreadBy === currentUser.uid) { updateDoc(doc(db, 'chats_meta', currentChatId), { unreadBy: null }); }
                    hasFriendRead = metaData && metaData.unreadBy === null; updateReadReceiptUI();
                    if (metaData && metaData.typing && metaData.typing !== currentUser.uid) { typingInd.textContent = `${currentChatUser.username} is typing...`; typingInd.classList.remove('hidden'); } else { typingInd.classList.add('hidden'); }
                } else { typingInd.classList.add('hidden'); let receiptEl = document.getElementById('dynamic-read-receipt'); if (receiptEl) receiptEl.style.display = 'none'; }
            });

            const q = query(collection(db, 'chats', currentChatId, 'messages'), orderBy('createdAt', 'asc'));
            unsubscribeChat = onSnapshot(q, (snapshot) => {
                container.innerHTML = ''; pinnedContent.innerHTML = ''; let hasPins = false; let lastMessageData = null;
                snapshot.docChanges().forEach((change) => { if (change.type === 'added' && !isFirstLoad) { if (change.doc.data().senderId !== currentUser.uid) playDingSound(); } });

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data(); const msgId = docSnap.id; lastMessageData = data;
                    let decryptedText = "[Error]"; try { decryptedText = CryptoJS.AES.decrypt(data.ciphertext, GLOBAL_OBFUSCATION_KEY).toString(CryptoJS.enc.Utf8); } catch (e) {}
                    let timeString = data.createdAt ? data.createdAt.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "Sending...";
                    const senderProfile = allUsersMap[data.senderId]; const isMe = data.senderId === currentUser.uid;

                    let contentHTML = '';
                    if (data.type === 'image') { contentHTML = `<img src="${decryptedText}" class="msg-image" alt="Shared Image" onclick="openLightbox(this.src)" onload="scrollToBottom()">`; } else { contentHTML = `<div class="msg-text">${decryptedText}</div>`; }
                    let quotedHTML = ''; if (data.replyToId && data.replyToText) { const safeReplyText = data.replyToText.replace(/</g, "&lt;").replace(/>/g, "&gt;"); quotedHTML = `<div class="quoted-message" onclick="scrollToMsg('${data.replyToId}')">${safeReplyText}</div>`; }

                    let reactionsHTML = '<div class="reactions-container">';
                    if (data.reactions) { for (const [emoji, users] of Object.entries(data.reactions)) { if (users.length > 0) { const iReacted = users.includes(currentUser.uid); reactionsHTML += `<span class="reaction-badge ${iReacted ? 'active' : ''}" onclick="toggleReaction('${msgId}', '${emoji}')">${emoji} ${users.length}</span>`; } } }
                    reactionsHTML += '</div>';

                    const safeTextForReply = data.type === 'image' ? '[Image]' : decryptedText.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    let actionsHTML = `<div class="msg-actions"><span class="quick-reacts"><button class="msg-action-btn" onclick="toggleReaction('${msgId}', '👍')">👍</button><button class="msg-action-btn" onclick="toggleReaction('${msgId}', '❤️')">❤️</button><button class="msg-action-btn" onclick="toggleReaction('${msgId}', '😂')">😂</button></span><button class="msg-action-btn" title="Reply" onclick="startReply('${msgId}', '${safeTextForReply}')">↩</button><button class="msg-action-btn" onclick="togglePin('${msgId}', ${data.isPinned || false})">${data.isPinned ? 'Unpin' : 'Pin'}</button>`;
                    if (isMe && data.type !== 'image') { actionsHTML += `<button class="msg-action-btn" onclick="editMessage('${msgId}', '${safeTextForReply}')">Edit</button>`; } actionsHTML += `</div>`;

                    const editedTag = data.isEdited ? `<span class="msg-edited">(edited)</span>` : '';
                    const customNameColor = senderProfile?.nameColor || 'var(--text-header)';

                    const msgHTML = `${actionsHTML}<div class="avatar-frame">${getAvatarHTML(senderProfile)}</div><div class="msg-content"><div class="msg-header"><span class="msg-username" style="color: ${customNameColor}">${senderProfile?.username || 'Unknown'}</span><span class="msg-time">Today at ${timeString} ${editedTag}</span></div>${quotedHTML}${contentHTML}${reactionsHTML}</div>`;
                    const msgDiv = document.createElement('div'); msgDiv.classList.add('message'); msgDiv.id = `msg-${msgId}`; msgDiv.innerHTML = msgHTML;
                    msgDiv.addEventListener('touchstart', (e) => handleTouchStart(e, msgId), {passive: true}); msgDiv.addEventListener('touchend', handleTouchEnd); msgDiv.addEventListener('touchmove', handleTouchMove, {passive: true}); msgDiv.addEventListener('touchcancel', handleTouchEnd);
                    container.appendChild(msgDiv);

                    if (data.isPinned) { hasPins = true; const pinDiv = document.createElement('div'); pinDiv.classList.add('pinned-msg'); pinDiv.onclick = () => scrollToMsg(msgId); pinDiv.innerHTML = `<strong style="color: ${customNameColor}">${senderProfile?.username}:</strong> ${data.type === 'image' ? '[Image]' : decryptedText}`; pinnedContent.appendChild(pinDiv); }
                });

                pinnedBar.style.display = hasPins ? 'block' : 'none'; isMyLastMessage = lastMessageData && lastMessageData.senderId === currentUser.uid; updateReadReceiptUI(); scrollToBottom(); isFirstLoad = false;
            });
        }

        // ==========================================
        // SENDING MESSAGES
        // ==========================================
        document.getElementById('message-form').addEventListener('submit', async (e) => {
            e.preventDefault(); const input = document.getElementById('message-input'); const text = input.value.trim();
            if (text && currentChatId) {
                try {
                    playPopSound();
                    const payload = { type: 'text', ciphertext: CryptoJS.AES.encrypt(text, GLOBAL_OBFUSCATION_KEY).toString(), senderId: currentUser.uid, createdAt: serverTimestamp(), isPinned: false, isEdited: false, reactions: {} };
                    if (replyingToMsg) { payload.replyToId = replyingToMsg.id; payload.replyToText = replyingToMsg.text; cancelReply(); }
                    await addDoc(collection(db, 'chats', currentChatId, 'messages'), payload);
                    
                    if (!currentChatUser.isGroup) {
                        await setDoc(doc(db, 'chats_meta', currentChatId), { unreadBy: currentChatUser.uid, typing: null }, { merge: true });
                        if (currentChatUser && currentChatUser.pushSubscription) { fetch(VERCEL_API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ subscription: currentChatUser.pushSubscription, title: "New Message", body: `From ${document.getElementById('my-username').textContent}`, icon: document.getElementById('my-avatar').querySelector('img')?.src || null }) }).catch(e => {}); }
                    } else {
                        await setDoc(doc(db, 'chats_meta', 'group_general'), { lastSenderId: currentUser.uid, lastSenderName: document.getElementById('my-username').textContent, timestamp: serverTimestamp() }, {merge:true});
                        Object.values(allUsersMap).forEach(user => { if (user.uid !== currentUser.uid && user.pushSubscription && !user.muteGroupNotifications) { fetch(VERCEL_API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ subscription: user.pushSubscription, title: "General Chat", body: `New message from ${document.getElementById('my-username').textContent}`, icon: document.getElementById('my-avatar').querySelector('img')?.src || null }) }).catch(e => {}); } });
                    }
                    input.value = '';
                } catch (error) {}
            }
        });

        document.getElementById('chat-image-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0]; if (!file || !currentChatId) return; e.target.value = ''; 
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image(); img.src = event.target.result;
                img.onload = async () => {
                    const canvas = document.createElement('canvas'); let width = img.width, height = img.height; const MAX_SIZE = 800; 
                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = width; canvas.height = height; canvas.getContext('2d').drawImage(img, 0, 0, width, height); const base64Img = canvas.toDataURL('image/jpeg', 0.6); 
                    try {
                        playPopSound(); 
                        const payload = { type: 'image', ciphertext: CryptoJS.AES.encrypt(base64Img, GLOBAL_OBFUSCATION_KEY).toString(), senderId: currentUser.uid, createdAt: serverTimestamp(), isPinned: false, reactions: {} };
                        if (replyingToMsg) { payload.replyToId = replyingToMsg.id; payload.replyToText = replyingToMsg.text; cancelReply(); }
                        await addDoc(collection(db, 'chats', currentChatId, 'messages'), payload);
                        
                        if (!currentChatUser.isGroup) {
                            await setDoc(doc(db, 'chats_meta', currentChatId), { unreadBy: currentChatUser.uid, typing: null }, { merge: true });
                            if (currentChatUser && currentChatUser.pushSubscription) { fetch(VERCEL_API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ subscription: currentChatUser.pushSubscription, title: "New Photo", body: `From ${document.getElementById('my-username').textContent}`, icon: document.getElementById('my-avatar').querySelector('img')?.src || null }) }).catch(e=>{}); }
                        } else {
                            await setDoc(doc(db, 'chats_meta', 'group_general'), { lastSenderId: currentUser.uid, lastSenderName: document.getElementById('my-username').textContent, timestamp: serverTimestamp() }, {merge:true});
                            Object.values(allUsersMap).forEach(user => { if (user.uid !== currentUser.uid && user.pushSubscription && !user.muteGroupNotifications) { fetch(VERCEL_API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ subscription: user.pushSubscription, title: "General Chat", body: `New Photo from ${document.getElementById('my-username').textContent}`, icon: document.getElementById('my-avatar').querySelector('img')?.src || null }) }).catch(e=>{}); } });
                        }
                    } catch (error) {}
                }
            }
        });

    </script>
</body>
