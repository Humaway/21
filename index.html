<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header>
            <h1 id="header-title">Global Chat</h1>
        </header>
        
        <div class="messages" id="messages-container">
            </div>

        <form id="message-form">
            <input type="text" id="message-input" placeholder="Type your message..." required autocomplete="off">
            <button type="submit">Send</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // TODO: Paste your actual Firebase config here!
        const firebaseConfig = {
          apiKey: "AIzaSyDXmjZBRGqhSPSTTxTDappbJOaFerRQwBw",
          authDomain: "messenger-cfa6e.firebaseapp.com",
          projectId: "messenger-cfa6e",
          storageBucket: "messenger-cfa6e.firebasestorage.app",
          messagingSenderId: "710266615819",
          appId: "1:710266615819:web:cadeb12f54c0f861032f0e",
          measurementId: "G-8P070D3ENF"
        };


        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- NEW: Ask the user for their name when the page loads ---
        let myUsername = prompt("Choose a username:", "Guest" + Math.floor(Math.random() * 1000));
        // If they click cancel, give them a default name
        if (!myUsername || myUsername.trim() === "") {
            myUsername = "Anonymous";
        }
        
        // Update the header so they know who they are logged in as
        document.getElementById('header-title').textContent = "Chatting as: " + myUsername;

        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const messagesContainer = document.getElementById('messages-container');

        const messagesRef = collection(db, 'messages');
        const q = query(messagesRef, orderBy('createdAt', 'asc'));

        onSnapshot(q, (snapshot) => {
            messagesContainer.innerHTML = ''; 
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                
                // Create the wrapper that will align left or right
                const wrapperDiv = document.createElement('div');
                wrapperDiv.classList.add('message-wrapper');
                
                // --- NEW: Check if the message belongs to the current user ---
                if (data.username === myUsername) {
                    wrapperDiv.classList.add('sent'); // Push right
                } else {
                    wrapperDiv.classList.add('received'); // Push left
                }

                // Create the username label
                const nameDiv = document.createElement('div');
                nameDiv.classList.add('sender-name');
                nameDiv.textContent = data.username || "Unknown";

                // Create the actual message bubble
                const messageDiv = document.createElement('div');
                messageDiv.classList.add('message');
                messageDiv.textContent = data.text;

                // Put it all together
                wrapperDiv.appendChild(nameDiv);
                wrapperDiv.appendChild(messageDiv);
                messagesContainer.appendChild(wrapperDiv);
            });
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        });

        messageForm.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const text = messageInput.value.trim();
            
            if (text) {
                try {
                    await addDoc(messagesRef, {
                        text: text,
                        username: myUsername, // --- NEW: Save the username to the database ---
                        createdAt: serverTimestamp()
                    });
                    messageInput.value = '';
                } catch (error) {
                    console.error("Error sending message: ", error);
                }
            }
        });
    </script>
</body>
</html>
