<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header>
            <h1>Global Chat</h1>
        </header>
        
        <div class="messages" id="messages-container">
            </div>

        <form id="message-form">
            <input type="text" id="message-input" placeholder="Type your message..." required autocomplete="off">
            <button type="submit">Send</button>
        </form>
    </div>

    <script type="module">
        // Import Firebase core and Firestore database modules
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // TODO: Replace this object with your actual Firebase project configuration!
        const firebaseConfig = {
          apiKey: "AIzaSyDXmjZBRGqhSPSTTxTDappbJOaFerRQwBw",
          authDomain: "messenger-cfa6e.firebaseapp.com",
          projectId: "messenger-cfa6e",
          storageBucket: "messenger-cfa6e.firebasestorage.app",
          messagingSenderId: "710266615819",
          appId: "1:710266615819:web:cadeb12f54c0f861032f0e",
          measurementId: "G-8P070D3ENF"
        };

        // Initialize Firebase and Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Get references to our HTML elements
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const messagesContainer = document.getElementById('messages-container');

        // Reference the "messages" collection in the database, ordered by time
        const messagesRef = collection(db, 'messages');
        const q = query(messagesRef, orderBy('createdAt', 'asc'));

        // Listen for updates in real-time
        onSnapshot(q, (snapshot) => {
            messagesContainer.innerHTML = ''; // Clear current messages
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const messageDiv = document.createElement('div');
                messageDiv.classList.add('message');
                messageDiv.textContent = data.text;
                messagesContainer.appendChild(messageDiv);
            });
            
            // Automatically scroll to the newest message at the bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        });

        // Handle sending a new message
        messageForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevent the page from refreshing
            
            const text = messageInput.value.trim();
            
            if (text) {
                try {
                    // Push the message to Firebase
                    await addDoc(messagesRef, {
                        text: text,
                        createdAt: serverTimestamp()
                    });
                    // Clear the input box after sending
                    messageInput.value = '';
                } catch (error) {
                    console.error("Error sending message: ", error);
                }
            }
        });
    </script>
</body>
</html>
